---
- name: Create Prometheus config directory
  file:
    path: /etc/prometheus
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Create Prometheus data directory
  file:
    path: /var/lib/prometheus
    state: directory
    owner: "65534"
    group: "65534"
    mode: "0755"

- name: Deploy Prometheus configuration
  template:
    src: prometheus.yml.j2
    dest: /etc/prometheus/prometheus.yml
    owner: root
    group: root
    mode: "0644"
  register: prometheus_config

- name: Deploy Prometheus alert rules
  template:
    src: alert.rules.yml.j2
    dest: /etc/prometheus/alert.rules.yml
    owner: root
    group: root
    mode: "0644"
  register: prometheus_rules

- name: Pull Prometheus image
  command: docker pull {{ prometheus_container_image }}
  register: prometheus_pull_result
  changed_when: "'Downloaded newer image' in prometheus_pull_result.stdout"

- name: Check if Prometheus container already exists
  command: docker ps -a --filter "name={{ prometheus_container_name }}" --format "{{ '{{.Names}}' }}"
  register: prometheus_container_check
  changed_when: false

- name: Remove Prometheus container if config changed (forces reload)
  command: docker rm -f {{ prometheus_container_name }}
  when:
    - prometheus_container_name in prometheus_container_check.stdout
    - prometheus_config.changed or prometheus_rules.changed

- name: Run Prometheus container
  command: >
    docker run -d
    --name {{ prometheus_container_name }}
    --restart unless-stopped
    --network host
    -v /etc/prometheus:/etc/prometheus
    -v /var/lib/prometheus:/prometheus
    {{ prometheus_container_image }}
    --config.file=/etc/prometheus/prometheus.yml
    --storage.tsdb.path=/prometheus
    --storage.tsdb.retention.time={{ prometheus_retention }}
    --web.enable-lifecycle
  when: >
    prometheus_container_name not in prometheus_container_check.stdout or
    prometheus_config.changed or prometheus_rules.changed
