---
- name: Create Grafana provisioning directories
  file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - /etc/grafana/provisioning/datasources
    - /etc/grafana/provisioning/dashboards/json
    - /var/lib/grafana

- name: Set ownership on Grafana data directory to match the container's user
  file:
    path: /var/lib/grafana
    state: directory
    owner: "472"
    group: "472"
    recurse: true

- name: Deploy Grafana datasource provisioning
  template:
    src: provisioning/datasources/datasource.yml.j2
    dest: /etc/grafana/provisioning/datasources/datasource.yml
    owner: root
    group: root
    mode: "0644"

- name: Deploy Grafana dashboard provider config
  template:
    src: provisioning/dashboards/dashboards.yml.j2
    dest: /etc/grafana/provisioning/dashboards/dashboards.yml
    owner: root
    group: root
    mode: "0644"

- name: Deploy the webserver01 overview dashboard
  copy:
    src: webserver01-overview.json
    dest: /etc/grafana/provisioning/dashboards/json/webserver01-overview.json
    owner: root
    group: root
    mode: "0644"

- name: Pull Grafana image
  command: docker pull {{ grafana_container_image }}
  register: grafana_pull_result
  changed_when: "'Downloaded newer image' in grafana_pull_result.stdout"

- name: Check if Grafana container already exists
  command: docker ps -a --filter "name={{ grafana_container_name }}" --format "{{ '{{.Names}}' }}"
  register: grafana_container_check
  changed_when: false

- name: Run Grafana container
  command: >
    docker run -d
    --name {{ grafana_container_name }}
    --restart unless-stopped
    --network host
    -v /etc/grafana/provisioning:/etc/grafana/provisioning
    -v /var/lib/grafana:/var/lib/grafana
    -e GF_SECURITY_ADMIN_USER={{ grafana_admin_user }}
    -e GF_SECURITY_ADMIN_PASSWORD={{ grafana_admin_password }}
    -e GF_SERVER_HTTP_PORT=3000
    {{ grafana_container_image }}
  when: grafana_container_name not in grafana_container_check.stdout
